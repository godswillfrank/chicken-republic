<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Receipt</title>
</head>
<body>
    <h1>Your Receipt 🧾</h1>
    <table border="1">
        <tr>
            <th>Item</th>
            <th>Price</th>
        </tr>
        {% for item in order %}
        <tr>
            <td>{{ item['name'] }}</td>
            <td>{{ item['price'] }}</td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <h2>TOTAL: {{ total }}</h2>
    <br>
    <a href="/">Order More</a>
</body>
</html>
